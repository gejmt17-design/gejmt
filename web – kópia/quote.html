<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Project | Slakop</title>
    <meta name="description" content="Tell us about your next project. We build websites, e-shops, and booking systems.">
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://unpkg.com; connect-src 'self';">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

    <!-- NAVBAR -->
    <nav id="navbar" class="glass-nav">
        <div class="nav-container container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Slakop Logo" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\' viewBox=\'0 0 40 40\'><text x=\'50%\' y=\'50%\' font-family=\'Arial\' font-size=\'24\' font-weight=\'bold\' fill=\'%230088FF\' text-anchor=\'middle\' dominant-baseline=\'central\'>S</text></svg>'">
                <span class="logo-text">Slakop</span>
            </a>
            
            <div class="nav-links">
                <a href="index.html#services">Services</a>
                <a href="index.html#portfolio">Portfolio</a>
                <a href="index.html#pricing">Pricing</a>
                <a href="index.html#contact">Contact</a>
            </div>

            <div class="nav-cta">
                <a href="index.html" class="btn btn-outline btn-sm">Back to Home</a>
            </div>
            
            <button class="mobile-menu-btn">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </nav>

    <!-- MOBILE MENU OVERLAY -->
    <div id="mobile-menu" class="mobile-menu-overlay">
        <button class="mobile-menu-close"><i data-lucide="x"></i></button>
        <div class="mobile-nav-links">
            <a href="index.html#services" class="mobile-link">Services</a>
            <a href="index.html#portfolio" class="mobile-link">Portfolio</a>
            <a href="index.html#pricing" class="mobile-link">Pricing</a>
            <a href="index.html#contact" class="mobile-link">Contact</a>
            <a href="index.html" class="btn btn-primary mt-4 mobile-cta">Back to Home</a>
        </div>
    </div>

    <!-- FORM SECTION -->
    <section class="section fade-in">
        <div class="container">
            <div class="form-container glass-card">
                <div class="section-header" style="margin-bottom: 2rem;">
                    <h2>Tell Us About Your Vision</h2>
                    <p>Let's build something amazing together. Fill out the form below and we'll get back to you within 24 hours.</p>
                </div>

                <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Request submitted successfully! We will be in touch.'); window.location.href='index.html';">
                    
                    <!-- Business Type Selection -->
                    <div class="form-group">
                        <label class="form-label">What do you need?</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="project_type" value="website" required checked>
                                <div class="radio-icon">
                                    <i data-lucide="globe"></i>
                                </div>
                                <div class="radio-content">
                                    <strong>Website</strong>
                                </div>
                            </label>

                            <label class="radio-card">
                                <input type="radio" name="project_type" value="booking">
                                <div class="radio-icon">
                                    <i data-lucide="calendar-check-2"></i>
                                </div>
                                <div class="radio-content">
                                    <strong>Booking System</strong>
                                </div>
                            </label>

                            <label class="radio-card">
                                <input type="radio" name="project_type" value="eshop">
                                <div class="radio-icon">
                                    <i data-lucide="shopping-cart"></i>
                                </div>
                                <div class="radio-content">
                                    <strong>E-shop</strong>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label" for="name">Your Name</label>
                            <input type="text" id="name" class="form-control" required placeholder="John Doe">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="company">Company / Business Name</label>
                            <input type="text" id="company" class="form-control" required placeholder="Slakop Ltd.">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="budget">Estimated Budget</label>
                            <select id="budget" class="form-control">
                                <option value="starter">Starter (€299)</option>
                                <option value="pro" selected>Pro (€599)</option>
                                <option value="eshop">E-shop (€999)</option>
                                <option value="custom">Custom Solution</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="details">Project Details</label>
                        <textarea id="details" class="form-control" placeholder="Tell us more about your business, your goals, and what features you need..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1rem;">
                        Submit Request <i data-lucide="arrow-right" style="margin-left: 0.5rem; width: 20px; height: 20px;"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer border-top">
        <div class="container footer-bottom" style="border: none; padding-top: 0;">
            <p>&copy; 2026 Slakop. All rights reserved.</p>
        </div>
    </footer>

    <!-- Initialize Custom Scripts -->
    <script src="script.js"></script>
</body>
</html>
